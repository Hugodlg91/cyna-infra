---
- name: Déploiement Zabbix Agent 2 (passif) sur serveurs Linux
  hosts: zabbix_linux
  become: true
  gather_facts: true

  vars:
    zabbix_server_ip: "10.0.2.30"
    zabbix_release_deb: "zabbix-release_latest_7.4+ubuntu26.04_all.deb"
    zabbix_release_url: "https://repo.zabbix.com/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.4+ubuntu26.04_all.deb"

  tasks:
    - name: Détecter la présence du sudo classique (sudo.ws)
      ansible.builtin.stat:
        path: /usr/bin/sudo.ws
      register: sudo_ws

    - name: Basculer sudo-rs vers le sudo classique (SRV-DMZ uniquement)
      ansible.builtin.command:
        cmd: update-alternatives --set sudo /usr/bin/sudo.ws
      register: sudo_switch
      changed_when: "'using' in sudo_switch.stdout or sudo_switch.rc == 0"
      failed_when: false
      when: sudo_ws.stat.exists

    - name: Vérifier si le dépôt Zabbix est déjà présent
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/zabbix.sources
      register: zabbix_repo

    - name: Télécharger le paquet zabbix-release
      ansible.builtin.get_url:
        url: "{{ zabbix_release_url }}"
        dest: "/tmp/{{ zabbix_release_deb }}"
        mode: '0644'
      when: not zabbix_repo.stat.exists

    - name: Installer le dépôt zabbix-release
      ansible.builtin.apt:
        deb: "/tmp/{{ zabbix_release_deb }}"
      when: not zabbix_repo.stat.exists

    - name: Mettre à jour le cache APT
      ansible.builtin.apt:
        update_cache: true

    - name: Installer Zabbix Agent 2
      ansible.builtin.apt:
        name: zabbix-agent2
        state: present

    - name: Configurer le serveur Zabbix (passif)
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"
      notify: Redémarrer zabbix-agent2

    - name: Désactiver le mode actif
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ServerActive='
        line: "# ServerActive= (mode passif uniquement)"
      notify: Redémarrer zabbix-agent2

    - name: Définir le hostname agent
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Hostname='
        line: "Hostname={{ zabbix_hostname | default(inventory_hostname) }}"
      notify: Redémarrer zabbix-agent2

    - name: Forcer le port d'écoute 10050
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ListenPort='
        line: "ListenPort=10050"
      notify: Redémarrer zabbix-agent2

    - name: Activer et démarrer zabbix-agent2
      ansible.builtin.systemd:
        name: zabbix-agent2
        enabled: true
        state: started

    - name: Vérifier que l'agent écoute sur 10050
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 10050
        timeout: 10
        state: started

  handlers:
    - name: Redémarrer zabbix-agent2
      ansible.builtin.systemd:
        name: zabbix-agent2
        state: restarted
